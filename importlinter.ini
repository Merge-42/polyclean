[importlinter]
root_package = polyclean

[importlinter:contract:contracts_pure]
name = Contracts must not import flows/adapters/bases
type = forbidden
source_modules =
    polyclean.posts_contract
    polyclean.instagram_contract
forbidden_modules =
    polyclean.create_post_flow
    polyclean.publish_post_flow
    polyclean.sqlite_adapter
    polyclean.instagram_adapter
    polyclean.publishing_api
